<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spy Web</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Spy Web</h1>
    <label>View as <select id="viewer"><option value="0">Bird</option><option value="1">Sea</option></select></label>
    <label id="faction-control" hidden>Play as <select id="human-faction"><option value="bird">Bird</option><option value="sea">Sea</option></select></label>
    <label id="ai-strategy-control" hidden>AI strategy <select id="ai-strategy"><option value="minimax">Minimax</option><option value="component">Component builder</option></select></label>
    <button id="new-game" hidden>New game</button>
    <label id="ai-knowledge-control" hidden><input id="show-ai-knowledge" type="checkbox"> Show AI knowledge</label>
    <span id="status"></span>
  </header>
  <div id="question-menu" class="context-menu" hidden></div>
  <main>
    <section class="analysis-column">
      <div class="response-card">
        <h2>Response</h2>
        <div id="response" class="muted">No response yet.</div>
      </div>
      <h2>Game log</h2>
      <ol id="history"></ol>
      <h2>Knowledge bases</h2>
      <div id="knowledge"></div>
      <h2>Deduction graph</h2>
      <div id="deductions"></div>
    </section>
    <section class="opponent-column">
      <h2>Opponent cards / notes</h2>
      <p class="muted">Drag cards onto your notes board. Notes stay in this browser.</p>
      <div class="notes-workspace">
        <div>
          <div class="scratch-grid" id="notes-grid"></div>
          <div class="component-grid" id="component-grid"></div>
        </div>
        <div class="notes-tray">
          <div id="notes-pool" class="cards dropzone"></div>
          <button id="clear-notes">Clear notes</button>
        </div>
      </div>
    </section>
    <section class="player-column">
      <h2>Your private board</h2>
      <div id="secret"></div>
      <div class="grid" id="board"></div>
      <h2>Actions</h2>
      <div id="actions"></div>
      <div id="error"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
